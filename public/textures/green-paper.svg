<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" preserveAspectRatio="none">
  <defs>
    <filter id="noise">
      <feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" type="fractalNoise" />
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.02)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.02)" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />
  <rect width="100%" height="100%" filter="url(#noise)" fill="#ffffff" />
</svg>
